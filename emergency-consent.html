<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro de Consentimiento de Emergencia</title>
    <style>
        :root {
            --primary-blue: #2C7DA0;
            --danger-red: #E63946;
            --bg-light: #F8F9FA;
            --text-dark: #333;
            --white: #FFFFFF;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-light);
            color: var(--text-dark);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }

        .card {
            background-color: var(--white);
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.1);
            width: 100%;
            max-width: 600px;
            padding: 30px;
        }

        h2 {
            color: var(--primary-blue);
            text-align: center;
            margin-bottom: 25px;
            font-weight: 600;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            font-weight: 500;
            color: var(--primary-blue);
        }

        input, select, textarea {
            width: 100%;
            padding: 12px;
            border: 1px solid #DDD;
            border-radius: 8px;
            box-sizing: border-box;
            font-size: 16px;
            transition: border-color 0.3s;
        }

        input:focus, select:focus, textarea:focus {
            outline: none;
            border-color: var(--primary-blue);
        }

        input[readonly] {
            background-color: #E9ECEF;
            cursor: not-allowed;
        }

        .bubbles-container {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin-top: 10px;
        }

        .bubble {
            background-color: #E1F5FE;
            border: 1px solid var(--primary-blue);
            color: var(--primary-blue);
            padding: 6px 12px;
            border-radius: 20px;
            cursor: pointer;
            font-size: 14px;
            transition: background 0.2s;
        }

        .bubble:hover {
            background-color: var(--primary-blue);
            color: white;
        }

        button.btn-submit {
            background-color: var(--danger-red);
            color: white;
            border: none;
            border-radius: 8px;
            padding: 15px;
            width: 100%;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 10px;
            transition: opacity 0.3s;
        }

        button.btn-submit:hover {
            opacity: 0.9;
        }

        .success-message {
            display: none;
            background-color: #D4EDDA;
            color: #155724;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 20px;
            text-align: center;
        }

        .error-message {
            display: none;
            background-color: #F8D7DA;
            color: #721C24;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 20px;
            text-align: center;
        }
    </style>
</head>
<body>

<div class="card">
    <h2>Registro de Consentimiento de Emergencia</h2>

    <div id="successMsg" class="success-message">¡Consentimiento registrado con éxito!</div>
    <div id="errorMsg" class="error-message"></div>

    <form id="consentForm">
        <div class="form-group">
            <label for="patient">Seleccionar Paciente *</label>
            <select id="patient" required>
                <option value="" disabled selected>Seleccione un paciente</option>
                <option value="49593002">Lorena García Rocha (CI: 49593002, 26 años)</option>
                <option value="3001003">Roberto Chavez Inca (CI: 3001003, 50 años)</option>
                <option value="3001002">Maria Elena Torres Vargas (CI: 3001002, 67 años)</option>
                <option value="3001001">Juan Carlos Perez Soria (CI: 3001001, 65 años)</option>
            </select>
        </div>

        <div class="form-group">
            <label for="timestamp">Fecha y Hora</label>
            <input type="text" id="timestamp" readonly>
        </div>

        <div class="form-group">
            <label for="witness">Nombre del testigo *</label>
            <input type="text" id="witness" placeholder="Nombre completo del testigo" required>
        </div>

        <div class="form-group">
            <label for="procedure">Procedimiento urgente *</label>
            <select id="procedure" required>
                <option value="" disabled selected>Seleccione un procedimiento</option>
                <option value="Reanimación cardiopulmonar">Reanimación cardiopulmonar</option>
                <option value="Intubación">Intubación</option>
                <option value="Cirugía de urgencia">Cirugía de urgencia</option>
                <option value="Transfusión sanguínea">Transfusión sanguínea</option>
                <option value="Administración de fármacos de alto riesgo">Administración de fármacos de alto riesgo</option>
                <option value="Otro">Otro</option>
            </select>
        </div>

        <div class="form-group">
            <label for="justification">Justificación *</label>
            <textarea id="justification" rows="4" placeholder="Describa la justificación médica..." required></textarea>
            <div class="bubbles-container">
                <div class="bubble" onclick="addJustification('Paciente inconsciente')">Paciente inconsciente</div>
                <div class="bubble" onclick="addJustification('Riesgo vital inminente')">Riesgo vital inminente</div>
                <div class="bubble" onclick="addJustification('Menor de edad sin apoderado')">Menor de edad sin apoderado</div>
                <div class="bubble" onclick="addJustification('Paciente en estado crítico sin capacidad de decisión')">Paciente en estado crítico sin capacidad de decisión</div>
            </div>
        </div>

        <button type="submit" class="btn-submit">REGISTRAR CONSENTIMIENTO</button>
    </form>
</div>

<script>
    // Set current timestamp
    function updateTimestamp() {
        const now = new Date();
        const day = String(now.getDate()).padStart(2, '0');
        const month = String(now.getMonth() + 1).padStart(2, '0');
        const year = now.getFullYear();
        const hours = String(now.getHours()).padStart(2, '0');
        const minutes = String(now.getMinutes()).padStart(2, '0');
        document.getElementById('timestamp').value = `${day}/${month}/${year} ${hours}:${minutes}`;
    }

    updateTimestamp();

    // Bubble click handler
    function addJustification(text) {
        const textarea = document.getElementById('justification');
        if (textarea.value.length > 0) {
            textarea.value += ', ' + text;
        } else {
            textarea.value = text;
        }
    }

    // Form submission
    document.getElementById('consentForm').addEventListener('submit', function(e) {
        e.preventDefault();

        const patientId = document.getElementById('patient').value;
        const witness = document.getElementById('witness').value.trim();
        const procedure = document.getElementById('procedure').value;
        const justification = document.getElementById('justification').value.trim();
        const timestamp = document.getElementById('timestamp').value;
        const dateOnly = timestamp.split(' ')[0];

        // Validation
        if (!patientId || !witness || !procedure || !justification) {
            showError("Por favor, complete todos los campos obligatorios.");
            return;
        }

        // Check for duplicates in localStorage (Same patient, same day)
        const storageKey = 'emergency_consents';
        let consents = JSON.parse(localStorage.getItem(storageKey)) || [];

        const isDuplicate = consents.some(c => c.patientId === patientId && c.date === dateOnly);

        if (isDuplicate) {
            showError("Ya existe un consentimiento registrado para este paciente el día de hoy.");
            return;
        }

        // Save data
        const newConsent = {
            patientId,
            witness,
            procedure,
            justification,
            timestamp,
            date: dateOnly,
            validUntil: calculateExpiry(dateOnly)
        };

        consents.push(newConsent);
        localStorage.setItem(storageKey, JSON.stringify(consents));

        // Success flow
        showSuccess();
        this.reset();
        updateTimestamp();
    });

    function calculateExpiry(dateStr) {
        const [day, month, year] = dateStr.split('/').map(Number);
        const expiryDate = new Date(year + 1, month - 1, day);
        const eDay = String(expiryDate.getDate()).padStart(2, '0');
        const eMonth = String(expiryDate.getMonth() + 1).padStart(2, '0');
        const eYear = expiryDate.getFullYear();
        return `${eDay}/${eMonth}/${eYear}`;
    }

    function showSuccess() {
        const msg = document.getElementById('successMsg');
        const error = document.getElementById('errorMsg');
        msg.style.display = 'block';
        error.style.display = 'none';
        setTimeout(() => {
            msg.style.display = 'none';
        }, 3000);
    }

    function showError(text) {
        const msg = document.getElementById('successMsg');
        const error = document.getElementById('errorMsg');
        error.innerText = text;
        error.style.display = 'block';
        msg.style.display = 'none';
    }
</script>

</body>
</html>
